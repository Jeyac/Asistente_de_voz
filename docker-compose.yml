services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asistente-voz-api
    ports:
      - "8000:8000"
    env_file:
      - path: .env.production
        required: false
    environment:
      APP_ENV: production
      DEBUG: "false"
      ENABLE_DOCS: "false"
      LOG_TO_FILE: "false"
      LOG_FORMAT: json
      PORT: "8000"
      HOST: 0.0.0.0
      WORKERS: "1"
      WAKEWORD_ENABLED: "true"
      WAKEWORD_ENGINE: openwakeword
      WAKEWORD_PHRASE: hey jarvis
      WAKEWORD_MODEL_PATH: models/wakeword/hey_jarvis_v0.1.onnx
      WAKEWORD_THRESHOLD: "0.4"
      ENABLE_SYSTEM_ACTIONS: "true"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      RETRAIN_INTENTS_ALWAYS: "true"
      TF_EPOCHS: "120"
      TF_VALIDATION_SPLIT: "0"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; p=os.getenv('PORT','8000'); urllib.request.urlopen(f'http://127.0.0.1:{p}/api/v1/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    restart: unless-stopped
